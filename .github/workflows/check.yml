name: OPCG Tracker

on:
  schedule:
    # Toutes les 30 minutes (UTC). Modifiable, mais évitez < 15 min pour
    # rester poli avec les sites scrapés.
    - cron: "*/30 * * * *"
  workflow_dispatch:   # bouton "Run workflow" dans l'onglet Actions

permissions:
  contents: write   # nécessaire pour committer state.json et history.json

concurrency:
  group: opcg-tracker
  cancel-in-progress: false

env:
  # Force Node 24 pour les actions JS (évite l'avertissement de
  # dépréciation Node 20 — voir https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      - name: Persist state and history
        run: |
          git config user.name  "tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json history.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "state: $(date -u +%FT%TZ)"
            git push
          fi
