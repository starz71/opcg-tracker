name: OPCG Tracker

on:
  schedule:
    # xx:05 et xx:35 (UTC) — décalé de l'heure ronde xx:00 où les serveurs
    # GitHub Actions sont saturés et skippent les crons gratuits.
    # Syntaxe explicite "5,35" plutôt que "*/30" : empiriquement mieux honorée.
    - cron: "5,35 * * * *"
  workflow_dispatch:   # bouton "Run workflow" dans l'onglet Actions

permissions:
  contents: write   # nécessaire pour committer state.json et history.json

concurrency:
  group: opcg-tracker
  cancel-in-progress: false

env:
  # Force Node 24 pour les actions JS (évite l'avertissement de
  # dépréciation Node 20 — voir https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          NTFY_TOPIC:                  ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_PRODUCTS:     ${{ secrets.TELEGRAM_TOPIC_PRODUCTS }}
          TELEGRAM_TOPIC_RESTOCKS:     ${{ secrets.TELEGRAM_TOPIC_RESTOCKS }}
          TELEGRAM_TOPIC_DISPLAY:      ${{ secrets.TELEGRAM_TOPIC_DISPLAY }}
          TELEGRAM_TOPIC_CASE:         ${{ secrets.TELEGRAM_TOPIC_CASE }}
          TELEGRAM_TOPIC_BOOSTER:      ${{ secrets.TELEGRAM_TOPIC_BOOSTER }}
          TELEGRAM_TOPIC_DOUBLE_PACK:  ${{ secrets.TELEGRAM_TOPIC_DOUBLE_PACK }}
          TELEGRAM_TOPIC_AUTRES:       ${{ secrets.TELEGRAM_TOPIC_AUTRES }}
          TELEGRAM_TOPIC_CURRENT_SET:  ${{ secrets.TELEGRAM_TOPIC_CURRENT_SET }}
        run: python tracker.py

      - name: Persist state and history
        run: |
          git config user.name  "tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json history.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "state: $(date -u +%FT%TZ)"
            git push
          fi
