# ─── ALERTES ────────────────────────────────────────────────────────
#
# Le mode par défaut tape dans le cache des listings scrapés (étape 1).
# Donc une alerte sans `type` matche tous les produits scrapés contre
# ses keywords / must_include / exclude / max_price.
#
# Astuce : laisser `sites` vide ou ne pas le préciser = TOUS les sites
# sont surveillés. Sinon, listez les site_ids voulus.
#
# Pour la référence Cardmarket : `cardmarket_ref` ajoute une ligne dans
# la notif avec le prix le plus bas Cardmarket pour comparaison directe.

alerts:

  # ──── DISPLAYS À VENIR (mots-clés purs) ────

  - name: "Display OP-16 FR"
    enabled: true
    keywords: ["OP-16", "OP16", "OP 16"]
    must_include: ["display"]
    exclude: ["english", "anglais", "japonais", "single", "carte unique", "booster pack"]
    # Sites FR uniquement (exclut les revendeurs JP)
    sites: [parkage, baron_collections, le_coin_des_barons, lesgentlemendujeu,
            ludisphere, destocktcg, cardshunter, masterset, guizette,
            mondes_fantastiques, tradingcardsxxx, mystic_ambre, bacchusia,
            les7royaumes, ultrajeux, bcd_jeux, maison_presse, king_jouet,
            fantasysphere, philibert, play_in, goupiya, ludiworld, oupi,
            poke_geek, smartoys, tofopolis, investcollect, maxireves,
            flevance, fantastik, micromania, espritjeu, fungamesnet,
            ludocortex, labellecarte, lerepaireducollectionneur]
    # Référence Cardmarket FR — décommentez et complétez l'URL quand
    # le produit existera sur Cardmarket :
    # cardmarket_ref:
    #   url: "https://www.cardmarket.com/fr/OnePiece/Products/Booster-Boxes/..."
    #   label: "CM FR"

  - name: "Display OP-16 JP (imports)"
    enabled: true
    keywords: ["OP-16", "OP16"]
    must_include: ["display"]
    sites: [japanresell, nippontcg, japondemande, japandco, jumpichiban]

  - name: "Précommande EB-03"
    enabled: true
    keywords: ["EB-03", "EB03"]
    must_include: ["display"]
    # sites omis = TOUS les sites

  - name: "Précommande PRB-02"
    enabled: true
    keywords: ["PRB-02", "PRB02"]
    must_include: ["display"]

  # ──── DISPLAYS EXISTANTS sous un seuil de prix ────

  - name: "OP-12 display FR sous 130€"
    enabled: true
    keywords: ["OP-12"]
    must_include: ["display"]
    exclude: ["english", "anglais", "japonais"]
    max_price: 130
    # cardmarket_ref:
    #   url: "https://www.cardmarket.com/fr/OnePiece/Products/Booster-Boxes/..."
    #   label: "CM FR"

  # ──── WANTSLIST CARDMARKET ────
  # Le tracker scrape la page comme une page de news : chaque ligne (produit)
  # est traitée comme un item. Vous serez notifié à chaque nouveau produit
  # listé, et à chaque baisse de prix.
  - name: "Wantslist Cardmarket — mangaka"
    enabled: true
    type: news_page
    url: "https://www.cardmarket.com/fr/OnePiece/Wants/22215309"
    site_name: "CM Wantslist"
    selectors:
      item: ".table-body > .row, .article-row, .row.article-row"
      title: ".col-md-7, .col-12, .seller-info"
      link: "a"
    # Optionnel : ne notifier que les produits sous un certain prix
    # max_price: 50

  # ──── SOURCES D'INFO (officiel + communauté) ────

  - name: "Site officiel ONE PIECE TCG (EN)"
    enabled: true
    type: news_page
    url: "https://en.onepiece-cardgame.com/news/"
    site_name: "Site officiel"
    selectors:
      item: ".news-list li, article, .news-item"
      title: ".title, h3, h2"
      link: "a"

  - name: "OnePiecePlayer — actu communauté"
    enabled: true
    type: rss
    url: "https://onepieceplayer.com/feed/"
    site_name: "OnePiecePlayer"

  - name: "OnePiece.gg — news"
    enabled: false   # à activer après vérification du flux RSS
    type: rss
    url: "https://onepiece.gg/news/feed/"
    site_name: "OnePiece.gg"


