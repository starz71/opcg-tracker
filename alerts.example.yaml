#
# COMMENT CHAQUE SITE EST SCRAPÉ
# ──────────────────────────────
# - Mode CATÉGORIE (par défaut) : le tracker récupère la page catégorie
#   "One Piece" du site et lit tous les produits visibles. C'est rapide,
#   poli, et marche sans avoir besoin de mots-clés. Vos alertes filtrent
#   ensuite ces produits par mots-clés (ex. "OP-16 + display").
# - La PLATEFORME (prestashop / shopify / woocommerce) déclenche les bons
#   sélecteurs CSS automatiquement. Si laissée vide, le tracker auto-détecte.
# - Si l'auto-détection échoue, vous pouvez forcer des sélecteurs explicites.
#
# PRIORITÉS (codes A/AA/B/C/D/JP issus de votre liste, purement informatifs)
# ─────────────────────────────────────────────────────────────────────────
#  AA = priorité maximale
#  A  = haute priorité
#  B  = priorité moyenne
#  C  = priorité standard
#  D  = priorité basse
#  JP = revendeurs spécialisés Japon

