# ─── RÉFÉRENCES CARDMARKET (lookup automatique) ─────────────────────
# Le tracker détecte le code de set (OP-12, EB-02…) et la langue (FR/EN/JP)
# dans le titre du produit, puis cherche l'URL Cardmarket correspondante
# dans cette table. Si trouvée, le prix CM est inclus dans la notification
# pour comparaison directe.
#
# Pré-rempli automatiquement depuis l'export Cardmarket pour 22 sets
# (OP-01 à OP-18, EB-01, EB-02, PRB-01, PRB-02).
#
# Note : Cardmarket fait une seule fiche pour les langues européennes (FR/EN),
# donc fr et en pointent vers la même URL. Pour le japonais, c'est une fiche
# distincte avec suffixe '-Non-English' ou '-Asia-Region-Legal'.
#
# Pour ajouter un nouveau set quand il sortira sur Cardmarket :
#   1. Sur www.cardmarket.com/fr/OnePiece, taper 'opXX booster box' (avec espace).
#   2. Cliquer sur le résultat avec 'Booster Box' (et sans 'Non-English' pour FR/EN).
#   3. Copier l'URL de la barre d'adresse → la coller dans la bonne ligne.

cardmarket_lookups:

  # ──────────────── Main sets (OP) ────────────────
  "OP-01": { fr: "https://www.cardmarket.com/fr/OnePiece/Products/Booster-Boxes/Romance-Dawn-Booster-Box", en: "https://www.cardmarket.com/fr/OnePiece/Products/Booster-Boxes/Romance-Dawn-Booster-Box", jp: "https://www.cardmarket.com/fr/OnePiece/Products/Booster-Boxes/Romance-Dawn-Booster-Box-Non-English" }
