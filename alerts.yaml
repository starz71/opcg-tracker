# ─── ALERTES ────────────────────────────────────────────────────────
alerts:

  # ─────────────────────────────────────────────────────────────────
  #  ALERTES PRODUITS — sites européens (FR / EN)
  #  Tout est pertinent SAUF sleeves, cartes à l'unité, starter decks
  # ─────────────────────────────────────────────────────────────────

  - name: "Nouveautés OP TCG (FR/EN)"
    enabled: true
    # Le titre du produit DOIT contenir au moins UN de ces mots-clés
    # (sinon : faux positif type "menu produit hors One Piece"). On accepte
    # plusieurs orthographes et toutes les variantes de noms de set OPCG.
    keywords: [
      "one piece", "one-piece", "onepiece",
      "OP-01", "OP-02", "OP-03", "OP-04", "OP-05", "OP-06", "OP-07",
      "OP-08", "OP-09", "OP-10", "OP-11", "OP-12", "OP-13", "OP-14",
      "OP-15", "OP-16", "OP-17", "OP-18", "OP-19", "OP-20",
      "OP01", "OP02", "OP03", "OP04", "OP05", "OP06", "OP07", "OP08",
      "OP09", "OP10", "OP11", "OP12", "OP13", "OP14", "OP15", "OP16",
      "OP17", "OP18", "OP19", "OP20",
      "OP14-EB", "OP15-EB", "OP16-EB", "OP17-EB",
      "EB-01", "EB-02", "EB-03", "EB-04", "EB-05",
      "EB01", "EB02", "EB03", "EB04", "EB05",
      "PRB-01", "PRB-02", "PRB-03", "PRB01", "PRB02", "PRB03",
      "DF-01", "DF-02", "DF-03", "DF-04", "DF01", "DF02", "DF03", "DF04",
      "luffy", "zoro", "nami", "sanji", "chopper", "robin", "franky",
      "brook", "jinbe", "ace", "sabo", "garp",
      "shanks", "kaido", "blackbeard", "newgate", "katakuri",
      "straw hat", "chapeau de paille", "azure sea", "azur",
      "memorial collection", "best selection",
      "ichiban kuji", "premium card collection",
      "celebration pack", "eternal", "anime 25th",
      "kami's island", "dieu", "héritage du maître", "heritage du maitre",
      "successeurs", "carrying on his will",
      "paramount war", "guerre au sommet",
      "egghead", "egg head", "wano", "thriller bark",
      "punk hazard", "sang royal", "royal blood",
      "des poings vifs", "wings of the captain",
      "pillars of strength", "kingdoms of intrigue",
      "twin champions", "starter deck",
      "premier chapitre", "ascension", "terres d'encre",
      "the worlds strongest", "world's strongest",
      "memorial", "anniversary", "live action",
      "tournament", "championship", "promo", "promotional",
    ]
    # Pas de keywords = on accepte tous les titres (désactivé : trop de faux positifs)
