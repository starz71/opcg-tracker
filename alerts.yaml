# ─── ALERTES ────────────────────────────────────────────────────────
alerts:

  # ─────────────────────────────────────────────────────────────────
  #  ALERTES PRODUITS — sites européens (FR / EN)
  #  Tout est pertinent SAUF sleeves, cartes à l'unité, starter decks
  # ─────────────────────────────────────────────────────────────────

  - name: "Nouveautés OP TCG (FR/EN)"
    enabled: true
    # Pas de keywords = on accepte tous les titres
    exclude: [
      # Sleeves / pochettes / protections
      "sleeve", "sleeves", "pochette", "pochettes",
      "protège-carte", "protege-carte", "protege carte", "card sleeve",
      # Starter decks (sets ST-XX, peuvent inclure les éditions spéciales)
      "starter deck", "starter-deck", "starter pack",
      "deck de démarrage", "deck de demarrage",
      "ST-01", "ST-02", "ST-03", "ST-04", "ST-05", "ST-06", "ST-07",
      "ST-08", "ST-09", "ST-10", "ST-11", "ST-12", "ST-13", "ST-14",
      "ST-15", "ST-16", "ST-17", "ST-18", "ST-19", "ST-20", "ST-21",
      "ST-22", "ST-23", "ST-24", "ST-25", "ST-26", "ST-27", "ST-28",
      "ST-29", "ST-30", "ST01", "ST02", "ST03", "ST04", "ST05",
      # Cartes à l'unité / singles
      "single card", "carte unique", "à l'unité", "a l'unite",
      "vendue à l'unité", "vendu à l'unité", "vendu a l'unite",
      "carte seule", "carte alt art", "alt-art card",
      # Accessoires
      "playmat", "tapis de jeu", "tapis jeu",
      "deck box", "deck-box", "deckbox",
      "binder", "classeur", "classeurs",
      "dice", "tokens"
    ]
    sites: [parkage, baron_collections, le_coin_des_barons, lesgentlemendujeu,
            ludisphere, destocktcg, cardshunter, masterset, guizette,
            mondes_fantastiques, tradingcardsxxx, mystic_ambre, bacchusia,
            les7royaumes, ultrajeux, bcd_jeux, maison_presse, king_jouet,
            fantasysphere, philibert, play_in, goupiya, ludiworld, oupi,
            poke_geek, smartoys, tofopolis, investcollect, maxireves,
            flevance, fantastik, micromania, espritjeu, fungamesnet,
            ludocortex, lerepaireducollectionneur]

  # ─────────────────────────────────────────────────────────────────
  #  ALERTES PRODUITS — imports Japon
  #  TOUT est pertinent (aucun filtre)
  # ─────────────────────────────────────────────────────────────────

  - name: "Nouveautés OP TCG Japon"
    enabled: true
    sites: [japanresell, nippontcg, japondemande, japandco, jumpichiban]

  # ─────────────────────────────────────────────────────────────────
  #  WANTSLIST CARDMARKET
  # ─────────────────────────────────────────────────────────────────

  - name: "Wantslist Cardmarket — mangaka"
    enabled: true
    type: news_page
    url: "https://www.cardmarket.com/fr/OnePiece/Wants/22215309"
    site_name: "CM Wantslist"
    selectors:
      item: ".table-body > .row, .article-row, .row.article-row"
      title: ".col-md-7, .col-12, .seller-info"
      link: "a"

  # ─────────────────────────────────────────────────────────────────
  #  SOURCES D'INFO (officiel + communauté)
  # ─────────────────────────────────────────────────────────────────

  - name: "Site officiel ONE PIECE TCG (EN)"
    enabled: true
    type: news_page
    url: "https://en.onepiece-cardgame.com/news/"
    site_name: "Site officiel"
    selectors:
      item: ".news-list li, article, .news-item"
      title: ".title, h3, h2"
      link: "a"

  - name: "OnePiecePlayer — sorties produits"
    enabled: true
    type: rss
    url: "https://onepieceplayer.com/feed/"
    site_name: "OnePiecePlayer"
    keywords: ["release", "pre-order", "preorder", "announce", "announced",
               "OP-1", "OP-2", "EB-0", "EB-1", "EB-2", "EB-3",
               "PRB-0", "PRB-1", "PRB-2", "ST-2", "starter deck"]
    exclude: ["banlist", "ban list", "banned", "errata",
              "how to play", "how-to-play", "deck guide", "tier list",
              "meta report", "tournament", "regional", "world champ",
              "interview", "podcast", "review", "spoiler"]

  - name: "OnePiece.gg — news"
    enabled: false
    type: rss
    url: "https://onepiece.gg/news/feed/"
    site_name: "OnePiece.gg"


